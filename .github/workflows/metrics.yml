name: Metrics
on:
  # Schedule updates
  schedule:
    - cron: "0 * * * *"
  # Lines below let you run workflow manually and on each commit
  push:
    branches: "main"
  workflow_dispatch:
jobs:
  apple-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Render metrics SVGs
        run: node scripts/generate-metrics.mjs
        env:
          # METRICS_TOKEN is read-only API access; commits below use the
          # default GITHUB_TOKEN so bot pushes never re-trigger this workflow.
          GH_TOKEN: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          GH_LOGIN: ${{ github.repository_owner }}
      - name: Commit updated metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/metrics-light.svg assets/metrics-dark.svg
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update metrics"
          git push
